  var MAX_TRANSITIONS = 1e3;
  var GameRunner = class {
    constructor(game) {
      this.currentChapterId = "";
      this.carriedIn = EMPTY_CARRY;
      this.gameElapsedMinutes = 0;
      this.gameOver = false;
      this.transitionCount = 0;
      this.game = game;
      this.startChapter(game.startChapterId, EMPTY_CARRY);
    }
    chapter(id) {
      const c = this.game.chapters.find((x) => x.id === id);
      if (!c) throw new Error(`Unknown chapter: ${id}`);
      return c;
    }
    startChapter(chapterId, carry) {
      const ch = this.chapter(chapterId);
      this.currentChapterId = chapterId;
      this.carriedIn = carry;
      const seeded = seedChapterStory(ch.story, carry, this.gameElapsedMinutes, this.game.gameDeadlineMinutes);
      this.engine = new GameEngine(seeded);
      this.settle();
    }
    // If the current chapter has ended, bank its elapsed time and transition (recursively).
    settle() {
      const v = this.engine.view();
      if (!v.endingReached || this.gameOver) return;
      const ch = this.chapter(this.currentChapterId);
      this.gameElapsedMinutes += v.state.time - parseTime(ch.story.startTime);
      if (ch.gameEnding) {
        this.gameOver = true;
        this.finalEndingId = v.endingReached.id;
        return;
      }
      if (++this.transitionCount > MAX_TRANSITIONS) {
        throw new Error(`Transition limit exceeded near chapter ${this.currentChapterId} (cycle?)`);
      }
      const carry = extractCarry(v.state, this.game.carry);
      const next = pickNextChapter(ch, v.state, v.endingReached.id);
      if (!next) {
        this.gameOver = true;
        this.finalEndingId = v.endingReached.id;
        return;
      }
      this.startChapter(next, carry);
    }
    start() {
      return this.view();
    }
    view() {
      const v = this.engine.view();
      const ch = this.chapter(this.currentChapterId);
      return {
        ...v,
        chapterId: this.currentChapterId,
        chapterTitle: ch.title,
        gameElapsedMinutes: this.gameElapsedMinutes,
        gameOver: this.gameOver,
        finalEndingId: this.finalEndingId
      };
    }
    choose(choiceId) {
      if (this.gameOver) return this.view();
      this.engine.choose(choiceId);
      this.settle();
      return this.view();
    }
    snapshot() {
      return {
        gameId: this.game.id,
        currentChapterId: this.currentChapterId,
        gameElapsedMinutes: this.gameElapsedMinutes,
        carriedIn: JSON.parse(JSON.stringify(this.carriedIn)),
        chapter: this.engine.snapshot()
      };
    }
    // Restore expects a snapshot taken DURING play (no pending un-transitioned ending).
    // FINDING (ENGINE-ASSESSMENT): the engine snapshots one chapter; the game snapshot wraps it with
    // chapter id + game clock + the carry that seeded the chapter.
    restore(snap) {
      if (snap.gameId !== this.game.id) throw new Error(`Snapshot is for game ${snap.gameId}, not ${this.game.id}`);
      this.gameElapsedMinutes = snap.gameElapsedMinutes;
      this.currentChapterId = snap.currentChapterId;
      this.carriedIn = snap.carriedIn;
      this.gameOver = false;
      this.finalEndingId = void 0;
      const ch = this.chapter(snap.currentChapterId);
      const seeded = seedChapterStory(ch.story, snap.carriedIn, snap.gameElapsedMinutes, this.game.gameDeadlineMinutes);
      this.engine = new GameEngine(seeded);
      this.engine.restore(snap.chapter);
    }
  };

        conditions: [{ field: "lead_blown", op: "is_true" }],
        body: "It is not personal, and that is the worst of it. The outfit does the sum the way it does every sum \u2014 what was taken, what it costs to take it back, what the difference buys in the way of a message \u2014 and you are a line in the ledger now, a number carried from one column to another in a room that smells of cold coffee and other people\u2019s money.\n\nThere is no speech. Men who are good with numbers do not make speeches. Somewhere out in the night the boxman is running, or is not; the building has stopped being your problem and become arithmetic, and arithmetic does not hurry and does not miss. The margin you spent the whole night buying back, minute by minute, is spent. The lead is gone.\n\nThey have you, and they have all the time the books allow \u2014 which is exactly as much as they need, and not one minute more."

  // src/experiments/countinghouse/play/main.ts
  function substituteTime(text, timeLabel) {
    return text.replace(/\{\{time\}\}/g, timeLabel);
  }
  function paragraphs(body, timeLabel) {
    return substituteTime(body, timeLabel).split("\n\n").map((p) => `<p>${escapeHtml(p)}</p>`).join("");
  }
  function escapeHtml(s) {
    return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }
  function meter(label, value, max) {
    const v = Math.max(0, Math.min(max, Number(value)));
    const pct = Math.round(v / max * 100);
    const low = pct <= 25 ? " low" : "";
    return `<div class="meter${low}"><span class="meter-label">${label}</span><span class="meter-track"><span class="meter-fill" style="width:${pct}%"></span></span></div>`;
  }
  function renderView(view) {
    var _a;
    if (view.gameOver && view.endingReached) {
      const e = view.endingReached;
      return `
      <div class="ending">
        <div class="ending-kicker">\u2014 an ending \u2014</div>
        <h1 class="ending-name">${escapeHtml(e.name)}</h1>
        <div class="prose">${paragraphs((_a = e.body) != null ? _a : e.summary, view.timeLabel)}</div>
        <button class="restart" data-restart="1">Case it again</button>
      </div>`;
    }
    const lead = view.state.vars.lead;
    const loot = view.state.vars.loot;
    const choices = view.choices.filter((c) => c.available).map((c) => `<button class="choice" data-choice="${c.id}">${escapeHtml(c.label)}</button>`).join("");
    return `
    <div class="status">
      <span class="chapter">${escapeHtml(view.chapterTitle)}</span>
      <span class="clock">${escapeHtml(view.timeLabel)}</span>
    </div>
    <div class="meters">${meter("Lead", lead, 60)}${meter("The Take", loot, 4)}</div>
    <div class="scene">
      <h2 class="node-title">${escapeHtml(view.node.title)}</h2>
      <div class="prose">${paragraphs(view.node.body, view.timeLabel)}</div>
    </div>
    <div class="choices">${choices}</div>`;
  }
  function mount(root) {
    let runner = new GameRunner(countinghouse);
    const draw = () => {
      root.innerHTML = renderView(runner.view());
      root.querySelectorAll("[data-choice]").forEach(
        (b) => b.addEventListener("click", () => {
          runner.choose(b.dataset.choice);
          draw();
          window.scrollTo({ top: 0, behavior: "smooth" });
        })
      );
      const restart = root.querySelector("[data-restart]");
      if (restart) restart.addEventListener("click", () => {
        runner = new GameRunner(countinghouse);
        draw();
      });
    };
    draw();
  }
  if (typeof document !== "undefined") {
    const el = document.getElementById("app");
    if (el) mount(el);
  }
})();
