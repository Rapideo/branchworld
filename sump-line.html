    nodes: [
      // 1 — opening
      {
        id: "n_drop",
        title: "Head of the Pitch",
        type: "scene",
        location: "surface_pitch",
        entryEffects: [{ field: "location", op: "change_location", value: "surface_pitch" }],
        body: "Cold comes up out of the shaft to meet you, the breath of moving water somewhere a long way down, and you stand at the head of the pitch with the rope running black over the edge.\n\nWhitethroat takes the afternoon\u2019s light and keeps it. Behind you, past the entrance crawl, it is {{time}} and grey and ordinary on the hill. Here there is only the lamp on your helmet, a small hard disc of white laid on the rock, and the dark crowding its edge the way it always does, patient, waiting for the battery to tire.\n\nRolly is above you on the pitch, racking up, breath fogging, cheerful in the way of someone who has done this a hundred times. \u201CStreamway\u2019s loud today,\u201D Rolly says, and laughs, and the laugh goes down the shaft and does not come back. The water far below answers nothing. It is not loud at you. It is just loud.\n\nYou check the rack, you check the light, you feel the cold already starting to look for the gaps in your wetsuit. You lean back against the rope and let the pitch take your weight.",
        choices: [
          { id: "c_down", label: "Down the pitch into the streamway.", destination: "n_stream", effects: [{ field: "time", op: "add_minutes", value: "15" }] }
        ]
      },
      // 2 — the pulse hits
      {
        id: "n_stream",
        title: "The Streamway",
        type: "event",
        location: "stream_passage",
        entryEffects: [
          { field: "location", op: "change_location", value: "stream_passage" },
          { field: "companion_status", op: "set", value: "hurt" },
          { field: "flood_water", op: "increment", value: "1" },
          { field: "clues", op: "add_clue", value: "clue_pulse" }
        ],
        body: "The streamway is a low rifting passage and the water is running fast and brown along its floor, and you are forty feet in, bent double, when the cave changes its mind.\n\nYou hear it before you understand it \u2014 a rising note up the passage, a pressure in your ears \u2014 and then the pulse comes through, a shoulder of water that was not there a breath ago, and it takes your legs and it takes Rolly harder. There is a sound a body makes against rock that you will not forget. When the surge drops back, Rolly is down in the running water with one boot wedged wrong in the floor and a face gone the colour of the rock.\n\n\u201CAnkle,\u201D Rolly says, through teeth, not looking at it. \u201CIt\u2019s the ankle. Don\u2019t \u2014 just give me a second.\u201D\n\nThe water is still rising at your shins. A second is the one thing the cave is not offering.",
        choices: [
          { id: "c_to_rolly", label: "Get down to Rolly.", destination: "n_rolly", effects: [{ field: "time", op: "add_minutes", value: "10" }] }
        ]
      },
      // 3 — the companion decision
      {
        id: "n_rolly",
        title: "Rolly Down",
        type: "conversation",
        location: "stream_passage",
        entryEffects: [{ field: "location", op: "change_location", value: "stream_passage" }],
        body: "You get a hand under Rolly\u2019s arm and the two of you sit a moment in the cold running water while the ankle is looked at and not looked at. It is bad. Not bone-through-skin bad, but the kind of bad that does not carry its own weight out of a cave.\n\nThe only known way out is the sump \u2014 the low duck under the boulder choke ahead, a short dive through into the next passage \u2014 and the water that just rose is the water that feeds it. Above the choke there is dry country, a longer way, a harder climb. Both of those are forward. Behind you the pitch is a waterfall now.\n\nRolly watches you do the arithmetic. \u201CI can hop,\u201D Rolly says, which is a lie you are both allowed. \u201CGo on. Don\u2019t look at me like that.\u201D",
        choices: [
          { id: "c_stabilise", label: "Splint the ankle and take Rolly with you \u2014 slower, but together.", destination: "n_carry", conditions: [{ field: "companion_status", op: "equals", value: "hurt" }], effects: [{ field: "time", op: "add_minutes", value: "20" }] },
          { id: "c_push", label: "No time to splint \u2014 push for the choke, Rolly limping behind.", destination: "n_choke_hub", effects: [{ field: "time", op: "add_minutes", value: "10" }, { field: "flood_water", op: "increment", value: "1" }] }
        ]
      },
      // 4 — carry (sets with_you, unconditional)
      {
        id: "n_carry",
        title: "Shouldering Rolly",
        type: "scene",
        location: "stream_passage",
        entryEffects: [
          { field: "location", op: "change_location", value: "stream_passage" },
          { field: "companion_status", op: "set", value: "with_you" }
        ],
        body: "You splint the ankle with a tackle-bag strap and two cold hands, and you get Rolly\u2019s arm over your shoulders, and you stand the two of you up out of the water like one tired animal.\n\nIt is slow. Every step is a negotiation between Rolly\u2019s weight and the floor and the current, and your lamp throws both your shadows huge and shaking on the passage wall. But you are moving, and you are moving together, and that is going to have to be worth what it costs.\n\n\u201CThanks,\u201D Rolly says, very quietly, once, and then doesn\u2019t say it again.",
        choices: [
          { id: "c_carry_on", label: "Carry on toward the choke.", destination: "n_choke_hub", effects: [{ field: "time", op: "add_minutes", value: "20" }] }
        ]
      },
      // 5 — the fork hub (also recoveryNodeId for the seal event). State-agnostic prose.
      {
        id: "n_choke_hub",
        title: "The Boulder Choke",
        type: "transition",
        location: "choke",
        entryEffects: [{ field: "location", op: "change_location", value: "choke" }],
        body: "The boulder choke is where the passage chokes itself half shut \u2014 a fall of car-sized blocks the cave dropped here in some older flood, with the water finding its way through the low gaps in white roaring threads. Down at the bottom, under the blocks, is the sump duck: the short drowned crawl that is the only known low way out. Above, a dry rift climbs away into the dark, breathing cold air down into your face.\n\nYou stand in the noise with Rolly and look at the two ways the cave has left you. The low one is fast and short and under water. The high one is dry and long and a climb. Your lamp\u2019s disc shivers on the wet blocks; the battery is tiring, and the dark at the edge of the light has come in a little closer than it was.\n\nDown, or up. The water is not going to wait for you to decide.",
        choices: [
          { id: "c_scout_high", label: "Scout the dry rift, up over the choke.", destination: "n_high_decide", effects: [{ field: "time", op: "add_minutes", value: "10" }] },
          { id: "c_check_low", label: "Climb down to the sump duck and look at the low way.", destination: "n_seal_present", conditions: [{ field: "cave_sump_sealed", op: "is_false" }], effects: [{ field: "location", op: "change_location", value: "sump_pool" }, { field: "time", op: "add_minutes", value: "10" }] },
          { id: "c_godown", label: "Commit straight to the water \u2014 it\u2019s rising fast.", destination: "n_take_low", conditions: [{ field: "flood_water", op: "gte", value: "2" }], effects: [{ field: "time", op: "add_minutes", value: "10" }] }
        ]
      },
      // 6 — high commit hub
      {
        id: "n_high_decide",
        title: "The Dry Ledge",
        type: "discovery",
        location: "choke_ledge",
        entryEffects: [{ field: "location", op: "change_location", value: "choke_ledge" }],
        body: "You climb up off the choke onto a dry ledge, and for the first time since the pulse the roar drops behind you to a steady underground weather. The air here is older, stiller, colder. Above, the rift goes up and on \u2014 the high traverse, the long dry way you have only ever heard described in the club hut, never walked.\n\nRolly gets up beside you or does not, depending on what you decided below. Either way the ledge is dry, and the lamp is dimmer than it was an hour ago, and the high way is the way that does not have water in it.\n\nHow you take it \u2014 and who you take \u2014 is the next thing the cave makes you choose.",
        choices: [
          { id: "c_lead_up", label: "Lead Rolly up onto the high route with you.", destination: "n_set_together", conditions: [{ field: "companion_status", op: "equals", value: "with_you" }], effects: [{ field: "time", op: "add_minutes", value: "10" }] },
          { id: "c_strand", label: "Rolly can\u2019t make the climb \u2014 fix a line, go up alone.", destination: "n_strand_rolly", conditions: [{ field: "companion_status", op: "not_equals", value: "with_you" }], effects: [{ field: "time", op: "add_minutes", value: "5" }] },

          { field: "cave_all_together", op: "set", value: "true" }

        body: "You get Rolly up onto the ledge beside you, both of you on the dry rock, both of you breathing like the climb cost more than it did. The splint has held. The ankle is a problem you are carrying forward whole, not a person you are leaving behind.\n\n\u201CStill a team,\u201D Rolly says, and means it as a question. You don\u2019t answer, because answering it out loud would be tempting the cave. But you are. For now you are.",
        choices: [
          { id: "c_on_high", label: "On to the high traverse, together.", destination: "n_take_high", effects: [{ field: "time", op: "add_minutes", value: "5" }] }

      },
      // 8 — strand latch (unconditional set lost + someone_lost)
      {
        id: "n_strand_rolly",
        title: "Leaving the Line",
        type: "scene",
        location: "choke_ledge",
        entryEffects: [
          { field: "location", op: "change_location", value: "choke_ledge" },
          { field: "companion_status", op: "set", value: "lost" },
          { field: "cave_someone_lost", op: "set", value: "true" },
          { field: "clues", op: "add_clue", value: "clue_left_rolly" }
        ],
        body: "There is no version of the high climb that Rolly\u2019s ankle survives, and you both know it before either of you says it. You fix a line down to the ledge below and clip Rolly to it, where it is dry, where the water cannot reach \u2014 yet.\n\n\u201CGo,\u201D Rolly says. \u201CGet out, send people in. I\u2019m fine here. I\u2019m fine.\u201D The third time is the one neither of you believes.\n\nYou climb. Below you Rolly\u2019s lamp becomes a smaller and smaller coin on the rock, and then the rift takes you round a corner and it is gone, and there is only your own light and the dry dark and the thing you are choosing to do.",
        choices: [
          { id: "c_climb_alone", label: "Climb up to the high traverse.", destination: "n_take_high", effects: [{ field: "time", op: "add_minutes", value: "5" }] }

      },
      // 9 — high route commit (resolves the high fork)
      {
        id: "n_take_high",
        title: "Over the Choke",
        type: "transition",
        location: "choke_ledge",
        resolvesEnding: true,
        entryEffects: [
          { field: "location", op: "change_location", value: "choke_ledge" },
          { field: "cave_route", op: "set", value: "high" }
        ],
        body: "You crest the top of the choke and the dry rift opens out ahead of you into the upper system, and the sound of the flood drops away below and behind until it is just the cave\u2019s own breathing again.\n\nThe water is behind you now. Everything ahead is up, and dry, and dark, and a long way.",
        choices: []
      },
      // 10 — the seal (present node / reached by choice). Marks the event done to avoid a later absent re-fire.
      {
        id: "n_seal_present",
        title: "The Sump Seals",
        type: "event",
        location: "sump_pool",
        entryEffects: [
          { field: "location", op: "change_location", value: "sump_pool" },
          { field: "cave_sump_sealed", op: "set", value: "true" },
          { field: "clues", op: "add_clue", value: "clue_saw_seal" },
          { field: "ev_sump_seal", op: "mark_event_completed" }
        ],
        body: "You climb down to the lip of the sump pool just as the mountain decides.\n\nThe duck has been shrinking the whole while \u2014 a hand\u2019s width of black airspace between the water and the rock roof, the only low way out, the brown flood climbing it without hurry or malice. There is no drama in it. The water rises because somewhere up the hill more water is coming down, and it does not know you are here.\n\nThen the airspace closes. It does not slam. It draws shut \u2014 the water meets the rock with a long sucking roar, air punched out sideways in a cold spray across your face \u2014 and where there was a way through there is only the pool, smooth and full and final.\n\nThe low way out is gone. You saw it close. You will not have to wonder, later, whether you might have made it. You know.",
        choices: [
          { id: "c_commit_water", label: "Commit to the water anyway \u2014 the sealed crawl is still a crawl.", destination: "n_take_low", effects: [{ field: "time", op: "add_minutes", value: "5" }] },
          { id: "c_retreat", label: "Turn back for the choke and the high way.", destination: "n_choke_hub", effects: [{ field: "location", op: "change_location", value: "choke" }, { field: "time", op: "add_minutes", value: "5" }] }
        ]
      },
      // 11 — sump route commit (resolves the default fork)
      {
        id: "n_take_low",
        title: "Down Into the Water",
        type: "transition",
        location: "sump_pool",
        resolvesEnding: true,
        entryEffects: [
          { field: "location", op: "change_location", value: "sump_pool" },
          { field: "cave_route", op: "set", value: "sump" }
        ],
        body: "You lower yourself into the cold flood at the bottom of the choke, and the water closes over your legs and then your chest, and the only way on now is a drowned one.\n\nWhatever air there is ahead, you will find by feel, in the dark, under the rock. You take a breath the cave lets you take, and you go down into the water.",
        choices: []
      }
    ],
    endings: [
      {
        id: "ch1_to_high",
        name: "Up Over the Choke",
        summary: "You commit to the dry high traverse; the way out is up.",
        conditions: [{ field: "cave_route", op: "equals", value: "high" }]
      },

        entryEffects: [{ field: "location", op: "change_location", value: "high_rift" }],
        body: "Over the choke the air goes dry and the cold changes its character. Down in the streamway the cold was wet and loud. Up here it is silent and patient, and it gets into the bone.\n\nYou stand at the foot of the aven rift, a tall blade of darkness climbing away above your lamp\u2019s reach. Your breath fogs and hangs. The water is behind you now, a sound dropped to a distant rumour somewhere below the floor. It is {{time}}, though up here that means nothing \u2014 there is no light to tell it by but the small white coin on your helmet, and that coin is smaller than it was at the pitch head. The battery has given the morning to the dark already. It will give the rest.\n\nYou flex your fingers. The cold has started to make them stupid, slow on the rock, and you have a long dry climb ahead before there is any chance of grey sky. The rift goes up. You can free-climb it fast and spend the warmth you have, or rig it slow and safe and spend the light instead.",
        choices: [

          { id: "c_rig", label: "Rig a protected line \u2014 slower and safer, but the lamp burns.", destination: "n_oxbow", effects: [{ field: "time", op: "add_minutes", value: "30" }, { field: "rope_pitches", op: "decrement", value: "1" }] }
        ]

      {
        id: "n_oxbow",
        title: "The Oxbow Bypass",
        type: "event",
        location: "oxbow",
        entryEffects: [{ field: "location", op: "change_location", value: "oxbow" }],
        body: "The rift tops out into the oxbow: a dry abandoned meander of the old streamway, a ribbon of stone bridging a black void. Far below, down in the gulf the bypass spans, you can hear water moving \u2014 a deep, patient sound \u2014 but your lamp cannot reach it and you cannot see it. There is only the dry span ahead and the dark on either hand.\n\nYou start across, one boot in front of the other on the cold stone, the void breathing up at you. The lamp lays its shrinking disc on the rock a few feet ahead. The cave is in no hurry. You are.",

          { id: "c_cross", label: "Cross the bypass to Crystal Hall.", destination: "n_crystal_hub", effects: [{ field: "time", op: "add_minutes", value: "20" }] }
        ]
      },
      {
        id: "n_pulse_present",
        title: "The Bypass Goes Under",
        type: "event",
        location: "oxbow",
        entryEffects: [{ field: "location", op: "change_location", value: "oxbow" }],
        body: "You are out on the oxbow bypass, mid-span over the void, when the roar climbs up to meet you.\n\nIt comes from below \u2014 from the black gulf the bypass bridges, the place where you could hear water but not see it. A second pulse, surging up the system from the drowned streamway, coming fast. The sound rises through the rock and through the soles of your boots and then the water itself is there, a brown lip clawing over the abandoned meander, taking the dry floor you are standing on and making it a river.\n\nThe cold of it hits before the wet does. Your lamp\u2019s disc jumps and skitters on the heaving surface. There is no time to think it through; there is only the far side, and the water between you and it rising while you watch. The cave is not trying to take you. The water is only doing what water does when more of it arrives than the passage can hold. But knowing that does not give you back the seconds the flood is eating.",

        ]
      },
      {
        id: "n_lose_here",
        title: "Cut Off Behind",
        type: "scene",
        location: "oxbow",
        entryEffects: [
          { field: "location", op: "change_location", value: "oxbow" },

          { field: "clues", op: "add_clue", value: "clue_oxbow_cut" }
        ],
        body: "You go for the far side and you go alone, and you do not look back until your boots are on dry stone again and the water is between you and where you were.\n\nThe bypass is a river now, lip to lip, and the dry span you crossed not a minute ago is gone under brown water that rose when water rises and did not care whose side anyone was on. Whoever was behind you is on the far side of that water. You can shout. You do shout. The roar takes it and gives nothing back.\n\nYou made the crossing. You did not make it whole. That is a thing you decided in the half-second the flood gave you to decide it, and it is yours now, the particular shape of it, to carry up into the light if you reach the light.",
        choices: [
          { id: "c_on_crystal", label: "Push on to Crystal Hall.", destination: "n_crystal_hub", effects: [{ field: "time", op: "add_minutes", value: "15" }] }

        body: "You are climbing the daylight shaft toward grey light impossibly far up when the lamp gives out.\n\nIt does not flicker and rally the way it has all afternoon. It dims, and dims, the small white disc pulling in to a coal, to a thread, to a memory of light on the rock six inches from your face \u2014 and then it is gone, and the dark you have been outrunning since the pitch head is simply there, total, with no edge to it at all.\n\nThe cave does not change. The shaft is the same shaft, the cold the same cold, the grey mouth of daylight still up there somewhere beyond the reach of any light you have left. The dark was always going to win this race; the battery only ever borrowed the afternoon from it. Now the loan is called.\n\nYou hold the rock. You can hear your own breath, and the far drip of water, and nothing that will tell you which way is up except the slow pull in your arms. You climb blind, a hand and a hand and a foot, into a darkness the cave has held since before there were eyes to be lost in it. Somewhere above is the light, and the {{time}} sky, and the ordinary afternoon you came down out of.\n\nThe cave is in no hurry. It has you, and the dark, and all the time there is."

    const lamp = view.state.vars.lamp_charge;
    const heat = view.state.vars.body_heat;
    const choices = view.choices.filter((c) => c.available).map((c) => `<button class="choice" data-choice="${c.id}">${escapeHtml(c.label)}</button>`).join("");
    return `
    <div class="status">
      <span class="chapter">${escapeHtml(view.chapterTitle)}</span>
      <span class="clock">${escapeHtml(view.timeLabel)}</span>
    </div>
    <div class="meters">${meter("Lamp", lamp, 100)}${meter("Warmth", heat, 100)}</div>
    <div class="scene">
      <h2 class="node-title">${escapeHtml(view.node.title)}</h2>
      <div class="prose">${paragraphs(view.node.body, view.timeLabel)}</div>
    </div>
    <div class="choices">${choices}</div>`;
  }
  function mount(root) {
    let runner = new GameRunner(sumpLine);
    const draw = () => {
      root.innerHTML = renderView(runner.view());
      root.querySelectorAll("[data-choice]").forEach(
        (b) => b.addEventListener("click", () => {
          runner.choose(b.dataset.choice);
          draw();
          window.scrollTo({ top: 0, behavior: "smooth" });
        })
      );
      const restart = root.querySelector("[data-restart]");
      if (restart) restart.addEventListener("click", () => {
        runner = new GameRunner(sumpLine);
        draw();
      });
    };
    draw();
  }
  if (typeof document !== "undefined") {
    const el = document.getElementById("app");
    if (el) mount(el);
  }
})();
</script>
</body>
</html>
