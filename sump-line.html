    nodes: [
      // ===== ACT 1 — THE DESCENT =====
      {
        id: "n_entrance",
        title: "The Entrance Series",
        type: "scene",
        location: "entrance_series",
        entryEffects: [{ field: "location", op: "change_location", value: "entrance_series" }],
        body: 'The hill takes you in through a slot in the limestone no wider than your shoulders, and the day goes out behind you a foot at a time.\n\nFirst the colour goes \u2014 the green of the fell, the grey of the sky \u2014 and then the warmth, and then, as the crawl turns and drops, the last grudging grey of daylight, until there is only the small hard disc of your lamp on wet rock and the dark folded close behind it. It is {{time}} on the surface. Down here it is no time at all; the cave has never had a clock but the one you brought, ticking down in the battery on your helmet.\n\nRolly is ahead of you in the crawl, voice bouncing flat off the close rock. "Smell that? Streamway\u2019s up. Been raining on the tops all week." A pause, a grunt as a tackle-bag snags and frees. "Be loud down there today." There is nothing in the voice but cheer. You have both done this a hundred times.\n\nThe crawl opens out ahead into the head of the first pitch, where the rope you rigged on the way in runs black over the lip into the dark. The cold air comes up the shaft to meet you, carrying the sound of moving water from a long way down.',
        choices: [
          { id: "c_gear_in", label: "Press on to the head of the pitch.", destination: "n_pitch_head", effects: [{ field: "time", op: "add_minutes", value: "10" }] },
          { id: "c_threshold", label: "Stop a moment at the edge of the dark.", destination: "n_threshold", effects: [{ field: "time", op: "add_minutes", value: "5" }] }
        ]
      },
      {
        id: "n_threshold",
        title: "The Edge of the Dark",
        type: "scene",
        location: "entrance_series",
        entryEffects: [{ field: "location", op: "change_location", value: "entrance_series" }],
        body: "You let Rolly\u2019s light go on ahead and you stop, just for a breath, where the last of the grey still reaches.\n\nPeople ask why, and you have never had a good answer for them. It is not the thrill; the thrill wore off years ago. It is something closer to the opposite \u2014 the way the cave does not care, the way it has been here doing exactly this, dripping and sealing and flooding and drying, for longer than there have been people to be frightened of it. There is a peace in being that small. Up in the light everything is about you. Down here nothing is.\n\nYou flex your fingers against the cold already finding them, check the lamp, check the rack. Then you turn your back on the last of the daylight, the way you always do, and follow Rolly\u2019s voice down into the hill.",
        choices: [
          { id: "c_to_pitch", label: "On to the pitch.", destination: "n_pitch_head", effects: [{ field: "time", op: "add_minutes", value: "5" }] }
        ]
      },
      {
        id: "n_pitch_head",
        title: "Head of the Pitch",
        type: "scene",
        location: "pitch_head",
        entryEffects: [{ field: "location", op: "change_location", value: "pitch_head" }],
        body: "You stand at the head of the pitch with the rope running black over the edge and the breath of moving water coming up cold out of the shaft.\n\nIt is a clean drop, forty feet of free hang down into the streamway, and you have rigged it and dropped it a dozen times. Rolly is beside you now, racking up, breath fogging, clipping the descender on with the unhurried competence of someone who has never once thought the cave might be the thing that finishes them. Below, the water is loud. Not loud at you \u2014 it does not know you are here \u2014 just loud, a fat heavy rush of it somewhere down in the dark, more than there should be.\n\nYou could drop straight in. Or there are a few minutes still to spend up here on the dry, where it is easy, before the cave gets hold of you properly.",
        choices: [
          { id: "c_descend", label: "Rig in and drop the pitch.", destination: "n_pitch_bottom", effects: [{ field: "time", op: "add_minutes", value: "15" }] },
          { id: "c_rolly_top", label: "A word with Rolly before you drop.", destination: "n_rolly_top", effects: [{ field: "time", op: "add_minutes", value: "10" }] },
          { id: "c_read_sky", label: "Listen to the water, read the signs.", destination: "n_weather", effects: [{ field: "time", op: "add_minutes", value: "5" }] }
        ]
      },
      {
        id: "n_rolly_top",
        title: "A Word at the Top",
        type: "conversation",
        location: "pitch_head",
        entryEffects: [{ field: "location", op: "change_location", value: "pitch_head" }],
        body: '"Pint after," Rolly says, not a question, threading the rope. "You\u2019re buying. You lost the bet on the survey." You did not lose the bet on the survey and you both know it, and that is the shape of the thing between you \u2014 a ledger of small invented debts, kept going for fifteen years, because the real debts do not bear saying out loud.\n\nYou have pulled each other out of worse than this. A flooded crawl in the Dales, a long cold night on a ledge in France waiting for the water to drop. Rolly was the one who kept talking, then, kept the fear at arm\u2019s length with nonsense until the dawn and the rescue came. You owe Rolly more than you have ever found a way to pay, and the way you pay it is this: you come down the hole together, and you go up it together, every time, no exceptions.\n\n"Right," Rolly says, testing the rig, all business now. "Down we go."',
        choices: [
          { id: "c_descend_after", label: "Drop the pitch.", destination: "n_pitch_bottom", effects: [{ field: "time", op: "add_minutes", value: "15" }] }
        ]
      },
      {
        id: "n_weather",
        title: "Reading the Water",
        type: "discovery",
        location: "pitch_head",
        entryEffects: [{ field: "location", op: "change_location", value: "pitch_head" }],
        body: "You crouch at the lip and listen the way the old hands taught you, and what you hear you do not much like.\n\nThe streamway is not just up; it is wrong. There is a note under the rush of it, a deep intermittent boom as some airspace down there fills and empties, the sound a cave makes when it is carrying more water than its passages were cut for. Rain on the tops all week, Rolly said, and the tops drain through here, and somewhere up on the moor the ground is full and giving the rest of it straight to the hole.\n\nA cave in this mood can pulse \u2014 can rise a foot in a minute, with no warning but the noise, when a held-back head of water somewhere upstream finally lets go. You file it away, cold and clear, the way you file the position of every handhold on a climb. The water is up, and the water is not done coming up. Whatever you do down there today, you do it knowing that.",
        choices: [
          { id: "c_descend_after_sky", label: "Drop in anyway \u2014 you came to cave.", destination: "n_pitch_bottom", effects: [{ field: "time", op: "add_minutes", value: "15" }] }
        ]
      },
      {
        id: "n_pitch_bottom",
        title: "Foot of the Pitch",
        type: "scene",
        location: "pitch_bottom",
        entryEffects: [{ field: "location", op: "change_location", value: "pitch_bottom" }],
        body: 'You come off the rope into the streamway and the noise closes over you like a second cold.\n\nHere the water is a real thing, ankle-deep and fast and brown, running hard over a cobbled floor that wants to take your feet from under you. The passage is a tall narrow rift, the walls close enough to touch on both sides, climbing away into the dark above your lamp\u2019s reach. Your light lays its disc on the moving water and the water will not hold it; it breaks and shivers and runs on. Rolly comes down after you, unclips, stamps feeling back into both boots.\n\n"All right," Rolly says, raising a voice over the water. "Sump\u2019s about forty minutes down. Quick look at the far series and out before tea?" The only known way out of the far series is the sump \u2014 the low drowned duck under the boulder choke downstream \u2014 and the way back, the pitch, is already a waterfall behind you. Forward is the plan. Forward is always the plan.',
        choices: [
          { id: "c_streamway", label: "Head downstream into the streamway.", destination: "n_streamway", effects: [{ field: "time", op: "add_minutes", value: "10" }] },
          { id: "c_inlet", label: "Check the side inlet first.", destination: "n_inlet", effects: [{ field: "time", op: "add_minutes", value: "5" }] }
        ]
      },
      {
        id: "n_inlet",
        title: "The Side Inlet",
        type: "discovery",
        location: "pitch_bottom",
        entryEffects: [{ field: "location", op: "change_location", value: "pitch_bottom" }],
        body: "A low inlet comes in from the side, and you duck your head in out of habit, lamp first.\n\nIt is barely a passage \u2014 a flat-out crawl carrying a thin separate stream that joins the main flow here \u2014 but what stops you is the colour of the water coming out of it. It is brown. Properly brown, peat-stained, thick with the moor. Clean cave water runs clear; this is surface water, and a lot of it, arriving fast and dirty straight off the saturated ground above. The inlet is doing in miniature what the whole system is doing: taking more than it can hold.\n\nCold runs down the back of your neck that has nothing to do with the temperature. You back out, and rejoin Rolly in the main passage, and do not say anything, because there is nothing to say that the water has not already said louder.",
        choices: [
          { id: "c_to_streamway", label: "Press on downstream.", destination: "n_streamway", effects: [{ field: "time", op: "add_minutes", value: "10" }] }
        ]
      },
      // ===== ACT 2 — THE STREAMWAY & THE PULSE =====
      {
        id: "n_streamway",
        title: "The Streamway",
        type: "scene",
        location: "streamway",
        entryEffects: [{ field: "location", op: "change_location", value: "streamway" }],
        body: "The streamway goes down through the hill in a series of cascades and pools, and you go down it with it, wading and stooping and bracing, the work of it almost warm against the cold.\n\nThis is the part you come for, if you are honest \u2014 the long muscular passage through the middle of the earth, the water at your knees and then your thighs, the lamp throwing your shadow huge and shaking on the rift wall, Rolly somewhere ahead or behind, the two lights making a small moving country of seeing in all the dark. The cave breathes cold around you. The boom of the deep water is louder now, closer, ahead.\n\nOff to one side an old high-level passage runs \u2014 a dry abandoned oxbow, a loop of streamway the water gave up on an age ago. And the floor here is flat enough to stop and sound the depth, if you want to know what the water is really doing before you commit further down.",
        choices: [
          { id: "c_press", label: "Press on down the streamway.", destination: "n_pulse", effects: [{ field: "time", op: "add_minutes", value: "10" }] },
          { id: "c_oxbow", label: "Climb up to explore the old oxbow.", destination: "n_oxbow_side", effects: [{ field: "time", op: "add_minutes", value: "10" }] },
          { id: "c_sound", label: "Stop and sound the depth of the water.", destination: "n_test_water", effects: [{ field: "time", op: "add_minutes", value: "5" }] }
        ]
      },
      {
        id: "n_oxbow_side",
        title: "The Old Oxbow",
        type: "discovery",
        location: "oxbow_side",
        entryEffects: [{ field: "location", op: "change_location", value: "oxbow_side" }],
        body: "You climb up out of the water into the old oxbow, and it is like stepping into another century. The water left here long ago; the floor is dry mud, cracked into plates, and the air is still and dead and almost warm after the streamway.\n\nSomeone was here before you, a long time ago. A coil of furred hemp rope, perished to felt. A carbide tin, rusted through. And high on the wall, far above where the streamway runs now, a tide-line \u2014 a dark stain of old flood mud, laid down by water that once filled this whole passage to the roof. You stand under it and do the arithmetic and it is not comforting. The cave has been this full before. It will be this full again. The only question the tide-line leaves open is whether you will be in it when it is.\n\nYou take a last look at the dead rope, the dead tin, the high dark water-line, and climb back down to where Rolly waits in the loud living stream.",
        choices: [
          { id: "c_oxbow_back", label: "Climb back down to the streamway.", destination: "n_streamway", effects: [{ field: "time", op: "add_minutes", value: "10" }] }
        ]
      },
      {
        id: "n_test_water",
        title: "Sounding the Water",
        type: "discovery",
        location: "streamway",
        entryEffects: [{ field: "location", op: "change_location", value: "streamway" }],
        body: "You brace against the wall and put a boot down into the deepest part of the channel, feeling for the bottom, reading the water through your legs the way you read rock through your hands.\n\nIt is deeper than it was an hour ago. You can feel it \u2014 the push of it higher up your thigh, the bottom scoured and shifting, cobbles rolling downstream under the force. The level is climbing, slowly, steadily, the way a bath fills. Not a pulse, not yet. Just the patient arithmetic of a moor giving up a week of rain through one hole in the ground, and the hole not quite wide enough.\n\nYou mark the wet line on the wall with your eye and file it. If it passes that mark, you will know the cave has stopped filling slowly and started filling fast, and that is the moment a sensible person is already at the sump and through it.",
        choices: [
          { id: "c_water_back", label: "Carry on down the streamway.", destination: "n_streamway", effects: [{ field: "time", op: "add_minutes", value: "5" }] }
        ]
      },
      {
        id: "n_pulse",
        title: "The Pulse",
        type: "event",
        location: "streamway",
        entryEffects: [
          { field: "location", op: "change_location", value: "streamway" },
          { field: "companion_status", op: "set", value: "hurt" },
          { field: "flood_water", op: "increment", value: "1" },
          { field: "clues", op: "add_clue", value: "clue_pulse" }
        ],
        body: 'It comes the way the old hands said it would, which is to say with no mercy and no warning but a half-second of sound.\n\nYou hear it before you understand it \u2014 the boom up the passage rising to a roar, a pressure in your ears \u2014 and then the pulse is there, a shoulder of brown water that was not there a breath ago, shockingly fast, and it takes your legs and it takes Rolly harder. You go down, come up gasping, slam a hand on rock and hold. When the surge drops back to a new, higher normal, Rolly is down in the running water a few feet on, one boot wedged wrong in the floor, face gone the grey of the rock.\n\nThere is a sound a body makes against stone that you will not forget. Rolly makes it, once, and then bites it off.\n\n"Ankle," Rolly says, through teeth, not looking at it. "It\u2019s the ankle. Don\u2019t \u2014 just give me a second." The water is already climbing past where it was. A second is the one thing the cave is not offering.',
        choices: [
          { id: "c_to_rolly", label: "Get down to Rolly.", destination: "n_rolly_down", effects: [{ field: "time", op: "add_minutes", value: "10" }] }
        ]
      },
      // ===== ACT 3 — THE ROLLY DECISION (spine 1) =====
      {
        id: "n_rolly_down",
        title: "Rolly Down",
        type: "conversation",
        location: "streamway",
        entryEffects: [{ field: "location", op: "change_location", value: "streamway" }],
        body: 'You get a hand under Rolly\u2019s arm and the two of you sit a moment in the rising water while the ankle is looked at and not looked at.\n\nIt is bad. Not bone-through-skin bad, but the kind of bad that does not carry its own weight out of a cave. The only known way out is the sump, downstream under the choke, a short dive through into the next passage and the way to the surface beyond. Above the choke there is dry country, a longer way, a hard climb. Both of those are forward. Behind you the pitch is a waterfall now and the water is still coming up.\n\nRolly watches you do the arithmetic, and you can see Rolly doing it too, and arriving first at the answer neither of you wants. "I can hop," Rolly says, which is a lie you are both allowed. "Go on. Don\u2019t look at me like that."',
        choices: [
          { id: "c_assess", label: "Look at the ankle properly before you decide.", destination: "n_assess", effects: [{ field: "time", op: "add_minutes", value: "5" }] },
          { id: "c_word", label: "Say the thing neither of you is saying.", destination: "n_rolly_word", effects: [{ field: "time", op: "add_minutes", value: "5" }] },
          { id: "c_stabilise", label: "Splint it and take Rolly with you \u2014 slower, together.", destination: "n_carry", conditions: [{ field: "companion_status", op: "equals", value: "hurt" }], effects: [{ field: "time", op: "add_minutes", value: "20" }] },
          { id: "c_push", label: "No time to splint \u2014 push for the choke, Rolly limping behind.", destination: "n_streamway_deep", effects: [{ field: "time", op: "add_minutes", value: "10" }, { field: "flood_water", op: "increment", value: "1" }] }
        ]
      },
      {
        id: "n_assess",
        title: "The Ankle",
        type: "discovery",
        location: "streamway",
        entryEffects: [{ field: "location", op: "change_location", value: "streamway" }],
        body: 'You get Rolly\u2019s boot off in the cold water, which is its own small cruelty, and look at what the cave has done.\n\nIt is already swelling, the joint going wrong colours, the foot turning at an angle a foot should not turn at. Not the bone, you think \u2014 the bone would be worse \u2014 but the ligaments are gone, torn through, and a torn ankle in a flooding cave is, for the practical purpose of getting out, the same as a broken one. Rolly cannot weight it. Rolly cannot climb on it. Rolly can, with a splint and your shoulder, hop and drag and be carried, slowly, at a cost in time you can feel the cave counting.\n\n"That bad?" Rolly says, watching your face. You don\u2019t answer. "Yeah," Rolly says. "Thought so."',
        choices: [
          { id: "c_assess_back", label: "Back to the decision.", destination: "n_rolly_down", effects: [{ field: "time", op: "add_minutes", value: "5" }] }
        ]
      },
      {
        id: "n_rolly_word",
        title: "The Unsaid Thing",
        type: "conversation",
        location: "streamway",
        entryEffects: [{ field: "location", op: "change_location", value: "streamway" }],
        body: '"If it comes to it," Rolly says, fast and low, getting it out before either of you can stop it, "you go. You hear me? Don\u2019t you dare die in here being noble about it. Send people in. That\u2019s the deal."\n\nIt is the opposite of the deal. The deal, the real one, the fifteen-year one, is that you do not leave each other in the hole. You both know which deal is the true one and which is the one fear makes a person say. You don\u2019t argue it. There is no time to argue it, and arguing it would mean saying out loud how bad this is, and the water is still rising, and Rolly\u2019s lips are already going blue at the edges.\n\n"Shut up," you say, as gently as it has ever been said. Rolly almost laughs. The almost-laugh goes down the passage and the water swallows it.',
        choices: [
          { id: "c_word_back", label: "Back to the decision.", destination: "n_rolly_down", effects: [{ field: "time", op: "add_minutes", value: "5" }] }
        ]
      },
      {
        id: "n_carry",
        title: "Shouldering Rolly",
        type: "scene",
        location: "streamway",
        entryEffects: [
          { field: "location", op: "change_location", value: "streamway" },
          { field: "companion_status", op: "set", value: "with_you" }
        ],
        body: 'You splint the ankle with a tackle-bag strap and two cold hands, and you get Rolly\u2019s arm over your shoulders, and you stand the two of you up out of the water like one tired animal.\n\nIt is slow. Every step is a negotiation between Rolly\u2019s weight and the current and the treacherous floor, and your lamp throws both your shadows huge and reeling on the wall. But you are moving, and you are moving together, and that is going to have to be worth what it costs in the one currency the cave is spending you down to: time. "Thanks," Rolly says, very quietly, once, and then doesn\u2019t say it again, and you are both grateful for that.',
        choices: [
          { id: "c_carry_on", label: "Carry on toward the choke.", destination: "n_streamway_deep", effects: [{ field: "time", op: "add_minutes", value: "15" }] }
        ]
      },
      // ===== ACT 4 — THE DEEP STREAMWAY & THE CHOKE (spine 2) =====
      {
        id: "n_streamway_deep",
        title: "The Deep Streamway",
        type: "scene",
        location: "streamway_deep",
        entryEffects: [{ field: "location", op: "change_location", value: "streamway_deep" }],
        body: "The streamway deepens and steepens toward the choke, and the cave stops being a place you walk through and becomes a place you fight.\n\nThe water is at your waist in the pools now, fast enough in the narrows to lean on, cold enough that your hands have started to go stupid and clumsy on the holds. Your breath comes ragged and fogs in the lamplight. Somewhere in here the joy of it has quietly gone and left only the labour, and under the labour, patient, the fear \u2014 not loud, just always there now, the steady knowledge that the way out is downstream under water that is still rising.\n\nAhead the passage chokes down. There is a tight wet squeeze to take direct, or a slower clamber round it over the boulders, or you can stop a moment in the lee of a buttress and gather what you have left before the choke.",
        choices: [
          { id: "c_to_choke", label: "Push on to the choke.", destination: "n_choke", effects: [{ field: "time", op: "add_minutes", value: "15" }] },
          { id: "c_squeeze", label: "Take the tight wet squeeze direct.", destination: "n_squeeze", effects: [{ field: "time", op: "add_minutes", value: "10" }] },
          { id: "c_pause", label: "Stop in the lee of the rock and gather yourself.", destination: "n_deep_pause", effects: [{ field: "time", op: "add_minutes", value: "5" }] }
        ]
      },
      {
        id: "n_squeeze",
        title: "The Wet Squeeze",
        type: "scene",
        location: "streamway_deep",
        entryEffects: [{ field: "location", op: "change_location", value: "streamway_deep" }],
        body: "You take the squeeze, because it is faster, and for thirty bad seconds you are reminded exactly how much the cave does not care.\n\nIt is a flat-out slot half-full of running water, and you go through it on your side with your face turned up to the inch of airspace at the roof, the rock pressing your chest, the current pulling at your legs, the lamp scraping and skittering against stone six inches from your eyes. There is a moment in the middle of it, wedged, exhaling to make yourself thinner, the water loud in your ear, when the old animal panic comes up the back of your throat and you have to put it down hard, the way you have learned to: name the next move, make the next move, do not think past it. A hand. A wriggle. A hand. And then the slot opens and spits you out the far side, gasping, into the deeper rift before the choke.",
        choices: [
          { id: "c_squeeze_on", label: "On to the choke.", destination: "n_choke", effects: [{ field: "time", op: "add_minutes", value: "10" }] }
        ]
      },
      {
        id: "n_deep_pause",
        title: "In the Lee of the Rock",
        type: "scene",
        location: "streamway_deep",
        entryEffects: [{ field: "location", op: "change_location", value: "streamway_deep" }],
        body: "You wedge into the lee of a buttress where the water runs slower and you stop, just for a moment, and let your heart come down out of your throat.\n\nThe cold is the enemy now as much as the water \u2014 you can feel it getting into the core of you, the shiver starting deep and constant, the way your thoughts have begun to come slower and stickier. You cup your hands over your mouth and breathe into them, useless, a habit. If Rolly is with you, you check Rolly: the lips, the eyes, the colour, the small signs of a body losing its war with the cold. If Rolly is not, you check the empty dark where Rolly should be, and look away from it.\n\nA minute. Just a minute. The cave does not begrudge you the minute, exactly; it simply keeps the meter running while you take it, the water rising and the lamp burning and the afternoon going, all on the same indifferent clock.",
        choices: [
          { id: "c_pause_on", label: "On to the choke.", destination: "n_choke", effects: [{ field: "time", op: "add_minutes", value: "10" }] }
        ]
      },
      {
        id: "n_choke",
        title: "The Boulder Choke",
        type: "transition",
        location: "choke",
        entryEffects: [{ field: "location", op: "change_location", value: "choke" }],
        body: "The boulder choke is where the cave chokes itself half shut \u2014 a fall of car-sized blocks dropped here in some older flood, the water finding its way through the low gaps in white roaring threads.\n\nDown at the bottom, under the blocks, is the sump duck: the short drowned crawl that is the only known low way out, and the water that just rose is the water that feeds it. Above, a dry rift climbs away into the dark, breathing cold air down at your face \u2014 the high way, the long way, a climb. Your lamp\u2019s disc shivers on the wet blocks; the battery is tiring, and the dark at the edge of the light has come in a little closer than it was.\n\nThis is the fork the whole afternoon has been carrying you toward. Down, into the water and the duck, fast and short and drowned. Or up, into the dry rift, long and cold and a climb. The water is not going to wait for you to decide.",
        choices: [
          { id: "c_scout_high", label: "Scout the dry rift, up over the choke.", destination: "n_high_decide", effects: [{ field: "time", op: "add_minutes", value: "10" }] },

          { id: "c_godown", label: "Commit straight to the water \u2014 it\u2019s rising fast.", destination: "n_take_low", conditions: [{ field: "flood_water", op: "gte", value: "2" }], effects: [{ field: "time", op: "add_minutes", value: "10" }] },
          { id: "c_study", label: "Study the choke and the water a moment longer.", destination: "n_choke_study", effects: [{ field: "time", op: "add_minutes", value: "5" }] }
        ]
      },
      {
        id: "n_choke_study",
        title: "Reading the Choke",
        type: "discovery",
        location: "choke",
        entryEffects: [{ field: "location", op: "change_location", value: "choke" }],
        body: "You hold your light on the choke a moment longer and make yourself read it properly, the way fear wants you not to.\n\nThe low way: the duck is still open, an airspace under the blocks, but the water is climbing the rock toward the roof while you watch, a slow brown tide. There is time to dive it. There may not be time to dither and then dive it. The high way: the dry rift goes up clean, but it is a climb, and a climb costs warmth and light and the one thing you are shortest of, and at the top of it lies a long traverse you have only ever heard described.\n\nNeither way is safe. That stopped being on the table when the pulse came through. What is on the table is which danger you choose, and the cave, patient, indifferent, lets you choose it, and goes on rising while you do.",
        choices: [
          { id: "c_study_back", label: "Back to the choke and the choice.", destination: "n_choke", effects: [{ field: "time", op: "add_minutes", value: "5" }] }
        ]
      },
      // ===== ACT 5 — THE COMMIT =====
      {
        id: "n_high_decide",
        title: "The Dry Ledge",
        type: "discovery",
        location: "choke_ledge",
        entryEffects: [{ field: "location", op: "change_location", value: "choke_ledge" }],
        body: "You climb up off the choke onto a dry ledge, and for the first time since the pulse the roar drops behind you to a steady underground weather.\n\nThe air here is older, stiller, colder. Above, the rift goes up and on \u2014 the high traverse, the long dry way out. Rolly is beside you or is not, depending on what you decided below, and either way the next thing the cave makes you choose is how you take the high road: whether you can get an injured caver up a climb like this at all, and what it means to try, and what it means not to.",
        choices: [

          { id: "c_commit_high", label: "Commit to the high traverse and go.", destination: "n_take_high", effects: [{ field: "time", op: "add_minutes", value: "5" }] }

          { field: "cave_all_together", op: "set", value: "true" }
        ],
        body: 'You get Rolly up onto the ledge beside you, both of you on the dry rock, both of you breathing like the climb cost more than it did. The splint has held. The ankle is a problem you are carrying forward whole, not a person you are leaving behind.\n\n"Still a team," Rolly says, and means it as a question. You don\u2019t answer out loud, because answering it would be tempting the cave. But you are. For now, against the cold and the dark and the water, you are.',
        choices: [
          { id: "c_on_high", label: "On to the high traverse, together.", destination: "n_take_high", effects: [{ field: "time", op: "add_minutes", value: "5" }] }
        ]
      },
      {
        id: "n_strand_rolly",
        title: "Leaving the Line",
        type: "scene",
        location: "choke_ledge",
        entryEffects: [
          { field: "location", op: "change_location", value: "choke_ledge" },

          { field: "clues", op: "add_clue", value: "clue_left_rolly" }

        body: 'There is no version of the high climb that Rolly\u2019s ankle survives, and you both know it before either of you says it. You fix a line down to the ledge below and clip Rolly to it, where it is dry, where the water cannot reach \u2014 yet.\n\n"Go," Rolly says. "Get out, send people in. I\u2019m fine here. I\u2019m fine." The third time is the one neither of you believes. You climb. Below you Rolly\u2019s lamp becomes a smaller and smaller coin on the rock, and then the rift takes you round a corner and it is gone, and there is only your own light and the dry dark and the thing you are choosing to do.',
        choices: [
          { id: "c_climb_alone", label: "Climb up to the high traverse.", destination: "n_take_high", effects: [{ field: "time", op: "add_minutes", value: "5" }] }

      {

        title: "Over the Choke",
        type: "transition",
        location: "choke_ledge",
        resolvesEnding: true,
        entryEffects: [
          { field: "location", op: "change_location", value: "choke_ledge" },
          { field: "cave_route", op: "set", value: "high" }
        ],
        body: "You crest the top of the choke and the dry rift opens out ahead into the upper system, and the sound of the flood drops away below and behind until it is just the cave\u2019s own breathing again. The water is behind you now. Everything ahead is up, and dry, and dark, and a long way.",

        title: "The Sump Seals",
        type: "event",

        entryEffects: [

          { field: "clues", op: "add_clue", value: "clue_saw_seal" },
          { field: "ev_sump_seal", op: "mark_event_completed" }
        ],
        body: "You climb down to the lip of the sump pool just as the mountain decides.\n\nThe duck has been shrinking the whole while \u2014 a hand\u2019s width of black airspace between the water and the rock roof, the only low way out, the brown flood climbing it without hurry or malice. Then the airspace closes. It does not slam. It draws shut \u2014 the water meets the rock with a long sucking roar, air punched out sideways in a cold spray across your face \u2014 and where there was a way through there is only the pool, smooth and full and final.\n\nThe low way out is gone. You saw it close. You will not have to wonder, later, whether you might have made it. You know.",
        choices: [
          { id: "c_commit_water", label: "Commit to the water anyway \u2014 the sealed crawl is still a crawl.", destination: "n_take_low", effects: [{ field: "time", op: "add_minutes", value: "5" }] },
          { id: "c_retreat", label: "Turn back for the choke and the high way.", destination: "n_choke", effects: [{ field: "location", op: "change_location", value: "choke" }, { field: "time", op: "add_minutes", value: "5" }] }

      {

        title: "Down Into the Water",
        type: "transition",

        resolvesEnding: true,
        entryEffects: [
          { field: "location", op: "change_location", value: "sump_pool" },
          { field: "cave_route", op: "set", value: "sump" }
        ],
        body: "You lower yourself into the cold flood at the bottom of the choke, and the water closes over your legs and then your chest, and the only way on now is a drowned one. Whatever air there is ahead, you will find by feel, in the dark, under the rock. You take a breath the cave lets you take, and you go down into the water.",
        choices: []

      // ===== ACT 1 — THE DRY ASCENT =====
      {

        entryEffects: [{ field: "location", op: "change_location", value: "high_rift" }],
        body: "Over the choke the air goes dry and the cold changes its character. Down in the streamway the cold was wet and loud. Up here it is silent and patient, and it gets into the bone.\n\nYou stand at the foot of the aven rift, a tall blade of darkness climbing away above your lamp\u2019s reach. Your breath fogs and hangs. The water is behind you now, a sound dropped to a distant rumour somewhere below the floor. It is {{time}}, though up here that means nothing \u2014 there is no light to tell it by but the small white coin on your helmet, and that coin is smaller than it was at the pitch head. The battery has given the morning to the dark already. It will give the rest.\n\nYou flex your fingers. The cold has started to make them stupid, slow on the rock, and you have a long dry climb ahead before there is any chance of grey sky. The rift goes up. You can free-climb it fast and spend the warmth you have, or rig it slow and safe and spend the light instead.",
        choices: [

        body: "You stop at the foot of the rift and breathe, hands cupped over your mouth, and let your heart come down a little.\n\nIt is a mistake, in a way \u2014 standing still is the cold getting its hands into you, and the lamp burns whether you climb or not. But there is a thing you have learned in twenty years underground, which is that fear climbs badly. Better to spend a minute now putting it down than to carry it up the rift in your arms. You look up into the dark the rift climbs into, where your light cannot reach, and you decide, the way you always decide, to go anyway.",

        body: "The aven goes up in a series of awkward chimneys and ledges, and you go up it the slow hard way, bridging cold rock with cold limbs, the lamp throwing your shadow reeling on the walls above you.\n\nIt is the kind of climbing that is all attention \u2014 a hand here, a foot there, the weight tested before it is trusted \u2014 and there is a mercy in that, because attention crowds out everything else, the cold and the hour and the long way still to go. You climb up out of the reach of the streamway\u2019s last rumour into a stiller, older silence, and the dark comes up the rift behind you, patient as ever, taking back the rock the moment your light leaves it.",
        choices: [

        body: 'You climb back down a body-length to where Rolly is wedged on a ledge, working up the rift behind you on one good leg and a great deal of stubbornness.\n\n"I\u2019m fine," Rolly says, before you can ask, which is how you know it is costing. The splinted ankle is held up off the rock, useless; the climbing is all arms now, and arms tire. But the eyes are clear and the voice is steady and the grip, when you take a hand to help over the awkward move, is still strong. "Stop fussing," Rolly says. "Get up there and find us a way out. I\u2019ll be right behind you." You believe it, mostly, and the mostly is enough to climb on.',
        choices: [

        entryEffects: [{ field: "location", op: "change_location", value: "high_rift" }],
        body: "Over the lip of the aven the passage levels and the lamp shows you less than it did.\n\nYou notice it the way you notice the light going at the end of a winter afternoon \u2014 not a moment, but a slow subtraction. The disc on the rock is smaller, yellower, the dark crowding nearer its rim. You hold a hand up and can just see it; an hour ago you could have read by this. The battery is tiring, and there is no charging it, no spare in the bag deep enough to matter, only the slow certainty that at some point up ahead the light will become a memory of light and then nothing, and you would very much like to be standing in daylight when that happens.",

        entryEffects: [{ field: "location", op: "change_location", value: "upper_gallery" }],
        body: "You turn aside into the smaller gallery, and for a moment forget the hour and the cold in the plain old wonder of the place.\n\nStraws hang from the roof in their hundreds, white and fragile, each one grown a few inches over centuries you cannot imagine. Curtains of flowstone fold down the walls like frozen weather. A cluster of helictites twists out sideways against all sense of which way is down. No one comes here; it is too far in, off the through-route, and it has been doing this slow patient beautiful thing in the absolute dark for longer than there have been eyes to mind that no one is watching. You stand in it a moment, your shrinking light moving over the formations, and then you turn back to the business of getting out, because the cave will still be making this long after you are not.",

      // ===== ACT 2 — THE OXBOW & THE SECOND PULSE =====

        body: "The gallery narrows to the oxbow: a dry abandoned meander of the old streamway, a ribbon of stone bridging a black void. Far below, down in the gulf the bypass spans, you can hear water moving \u2014 a deep, patient sound \u2014 but your lamp cannot reach it and you cannot see it. There is only the dry span ahead and the dark on either hand.\n\nYou stand at the near end of it, the void breathing cold up at you, the lamp laying its shrinking disc on the rock a few feet out. Across the span is Crystal Hall and the last shaft and the way to the surface. The cave is in no hurry. You are.",

        body: "You are out on the oxbow bypass, mid-span over the void, when the roar climbs up to meet you.\n\nIt comes from below \u2014 from the black gulf the bypass bridges, the place where you could hear water but not see it. A second pulse, surging up the system from the drowned streamway, coming fast. The sound rises through the rock and through the soles of your boots and then the water itself is there, a brown lip clawing over the abandoned meander, taking the dry floor you are standing on and making it a river.\n\nThe cold of it hits before the wet does. Your lamp\u2019s disc jumps and skitters on the heaving surface. There is no time to think it through; there is only the far side, and the water between you and it rising while you watch. The cave is not trying to take you. The water is only doing what water does when more of it arrives than the passage can hold. But knowing that does not give you back the seconds the flood is eating.",

        body: "You go for the far side and you go alone, and you do not look back until your boots are on dry stone again and the water is between you and where you were.\n\nThe bypass is a river now, lip to lip, and the dry span you crossed not a minute ago is gone under brown water that rose when water rises and did not care whose side anyone was on. Whoever was behind you is on the far side of that water. You can shout. You do shout. The roar takes it and gives nothing back.\n\nYou made the crossing. You did not make it whole. That is a thing you decided in the half-second the flood gave you to decide it, and it is yours now, the particular shape of it, to carry up into the light if you reach the light.",
        choices: [

        body: "The last stretch before Crystal Hall is a low broken passage of fallen blocks, and you cross it in a light that is nearly gone.\n\nYou find the holds by feel as much as sight now, the disc on your helmet pulled in to a dim coin you have to lean close to use, the dark sitting just beyond your hands and following you like a patient animal. You talk yourself across it the way you were taught, naming each move before you make it, because the alternative \u2014 letting yourself feel how alone you are, how far in, how nearly out of light \u2014 is the kind of thinking that gets people killed in here. A block. A gap. A block. And then ahead the passage opens out, and your dim light catches a thousand small wet glints, and you have reached Crystal Hall.",

        entryEffects: [{ field: "location", op: "change_location", value: "crystal_hall" }],
        body: "You hold still in the glittering cold and listen, and the cave gives you back its small underground weather: the tick and drip of water finding its slow way through stone, the far-off rumour of the flood working below, and under all of it the enormous silence the dark is made of.\n\nThere is nothing in it about you. That is the thing you keep coming back to, down here, the thing that is either the worst of it or the best, depending on the day. The cave is not listening back. It made this hall drop by drop over a time you cannot hold in your head, and it will go on dropping water in the dark long after today is a story or not even that. You are a warm loud brief thing passing through. You take a breath of the dead cold air, and you turn back to the shaft, because passing through is the whole job now.",

        body: 'You get Rolly wedged out of the worst of the draught and check the splint and the colour of the hurt foot and the colour of Rolly\u2019s face, none of which you like, all of which you have seen worse.\n\n"Last shaft," you say. "Then daylight." "Then a pint," Rolly says, "which you are buying," and the old joke is so worn smooth that it barely needs saying, which is exactly why it is worth saying. You share the last of the warmth that two cold bodies can make. Then there is nothing left to do but the shaft, and you both know it, and you get up to do it.',

      {
        id: "end_dark_high",
        name: "The Cave Keeps You",
        summary: "The lamp died on the traverse; the dark, which was always going to win the race, has you.",
        priority: 2,
        conditions: [{ field: "cave_dark_out", op: "is_true" }],
        body: "You are climbing the daylight shaft toward grey light impossibly far up when the lamp gives out.\n\nIt does not flicker and rally the way it has all afternoon. It dims, and dims, the small white disc pulling in to a coal, to a thread, to a memory of light on the rock six inches from your face \u2014 and then it is gone, and the dark you have been outrunning since the pitch head is simply there, total, with no edge to it at all.\n\nThe cave does not change. The shaft is the same shaft, the cold the same cold, the grey mouth of daylight still up there somewhere beyond the reach of any light you have left. The dark was always going to win this race; the battery only ever borrowed the afternoon from it. Now the loan is called.\n\nYou hold the rock. You can hear your own breath, and the far drip of water, and nothing that will tell you which way is up except the slow pull in your arms. You climb blind, a hand and a hand and a foot, into a darkness the cave has held since before there were eyes to be lost in it. Somewhere above is the light, and the {{time}} sky, and the ordinary afternoon you came down out of.\n\nThe cave is in no hurry. It has you, and the dark, and all the time there is."

        name: "Out, But Not Whole",
        summary: "You climb out into the rain \u2014 and not in any way you wanted. Rolly is behind the water.",
        priority: 1,
        conditions: [{ field: "cave_someone_lost", op: "is_true" }],
        body: "You come up the last of the shaft into grey, and the grey is daylight, and the daylight is real. It is thin and cold and the most the hill has to give at {{time}}, but it is sky, and you climb out into it on hands and knees and lie in the wet heather with the rain on your face and breathe air that no rock has been sitting on. You made it. The cave let you have this.\n\nIt did not let you have all of it. Rolly is not beside you. Somewhere back in the dark, on the wrong side of water that rose when water rises and did not care whose side anyone was on, Rolly is behind you \u2014 left, lost, cut off, the particular shape of it your own to carry. You climbed out lighter than you went in, and not in any way you wanted.\n\nThe lamp still burns its small disc, useless now in the open. You should turn it off. You don\u2019t, not yet. You lie in the rain looking back at the black slot in the hillside, and the cave looks back the way it always does, which is not at all.\n\nThere will be a call-out. Lights, ropes, people who do this. Maybe in time, maybe not in time; the mountain keeps its own counsel on that and tells you nothing. You are out. You are not whole. The cold has the truth of it, and the cold does not lie."
      },
      {
        id: "end_daylight_all_three",
        name: "Daylight, All Three",

        priority: 0,
        conditions: [
          { field: "cave_all_together", op: "is_true" },
          { field: "cave_dark_out", op: "is_false" },
          { field: "cave_hypothermic", op: "is_false" }
        ],
        body: "The shaft gives up its grey a hand\u2019s breadth at a time, and then all at once it is not grey but daylight, watery and cold and absolutely real, and you come up out of the black slot in the hillside into the rain and the wind and the enormous ordinary sky.\n\nYou get Rolly up after you, the splint still holding, the ankle a problem for a hospital and not for the cave anymore. The two of you lie in the wet heather and laugh the way people laugh when the laugh is mostly just breathing, and the rain comes down on your faces and it is the best thing either of you has ever felt.\n\nThe lamp is still going. A small thing, but you notice it \u2014 the disc you watched shrink all afternoon, still throwing its useless light up into the daylight, the battery that lasted, the dark that did not get you after all. You turn it off yourself, on your own terms, in the light.\n\nBelow you the cave keeps doing what the cave does \u2014 rising, sealing, dropping, on its own indifferent clock \u2014 and it will go on doing it long after the call-out and the kettle and the long warm telling of this in the club hut. But it did not keep you, and it did not keep Rolly. Not today. You came down to do a routine afternoon, and you are walking off the hill having done a harder one whole."
      },

        id: "end_grey_high",
        name: "A Grey Way Out",
        summary: "You surface \u2014 cold, shaken, the cost of it left unspoken. Out, but the cave kept something.",
        priority: 0,
        isDefault: true,
        conditions: [],
        body: "You climb the last of the shaft on hands going stupid with cold and lungs full of stale cave air, and at the top of it there is grey \u2014 not much grey, the thin worn-out grey of a wet afternoon going toward dark, but grey, and it means sky, and it means out.\n\nYou haul yourself up into the rain and lie a while in the heather, breathing, the black slot of the cave at your back. The lamp still gives its small tired disc, dimmer than it was, the dark beaten by a margin you would rather not measure. You are out. That is the fact you hold onto, because some of the other facts of the afternoon are heavier and you are too cold to lift them yet.\n\nIf there is anyone beside you in the heather, you do not say anything; you just lie there together being out. If there is not, the rain falls on you alone and you let it. The cave behind you neither mourns nor celebrates; it rose and it sealed on its own clock, and now it is quiet, and it will be quiet a long time.\n\nThere will be a phone, and a kettle, and people. Later. For now there is the grey sky and the cold rain and the enormous fact of being out of the dark, and that, for the moment, is enough, and has to be."

        priority: 1,
        conditions: [{ field: "cave_sump_sealed", op: "is_true" }],
        body: "The water never gives you the gap, and in the end it stops pretending it might.\n\nThe seal is shut. The crawl is full, roof to floor, the airspace you needed gone under risen water that came back up the way it always comes back up, on its own indifferent clock. The easy way out \u2014 the dropped-water window, the dive through to the far rift \u2014 closed somewhere back there, and you are on this side of it, in the gravel and the dark, with the sump between you and the rest of the cave.\n\nYou are behind the sump. The phrase has a sound to it you have heard in the club hut, on winter nights, in other people\u2019s stories, and you never thought to be inside one. There is air here, for now, a pocket of it in the gravel chamber. There is a little light left. There is the cold, which has all of you it wants and is still taking more.\n\nIf there is anyone beside you in the dark, you share the air and the waiting. If there is not, the waiting is only yours. You knock on the rock \u2014 bang, bang, bang, a pause \u2014 the slow signal, up through a mountain that carries the sound and does not answer, because rock does not answer. Somewhere a call-out will start. The water sealed on its own schedule and offers no opinion on whether it will start in time."
      },
      {
        id: "end_grey_sump",
        name: "A Grey Way Out",
        summary: "You pull through the dropped-water window into the far rift and climb out \u2014 cold, shaking, alive.",
        priority: 0,
        conditions: [
          { field: "cave_crossed", op: "is_true" },
          { field: "cave_dark_out", op: "is_false" }
        ],
        body: "You pull along the drowned crawl on the last of the breath in your chest, hand over hand on rock you cannot see, lungs burning, the cold no longer something happening to you but something you are \u2014 and then the rock above your fingers is gone and your face breaks a surface and you are gulping foul wet air in a slot of rising stone on the far side of the seal.\n\nYou made it through. The window held the few seconds you needed and you spent them right. Beyond the crawl the far rift climbs, wet and cold but going up, going out, the water finally at your back instead of over your head.\n\nYou climb the rift on hands that have stopped properly working, and somewhere up it there is grey \u2014 the thin worn grey of a wet afternoon \u2014 and then there is rain on your face and the enormous ordinary sky, and you haul yourself out of the black slot in the hillside and lie in the heather and shake, and the shaking is the warmest thing you have felt in hours.\n\nIf there is anyone beside you, you got them out too, and you do not yet have the breath to say what that is worth. If there is not, you lie alone in the rain and are out, and the cave behind you neither mourns nor celebrates; it sealed and dropped and rose on its own clock, and let you through a gap it never opened for your sake. You are cold and shaking and out, and out is the whole of it, and it is enough."
      },
      {
        id: "end_long_cold_wait",
        name: "The Long Cold Wait",
        summary: "The water does not drop in time; you wedge in the gravel, knock on the rock, and wait for a rescue that may or may not come.",
        priority: 0,
        isDefault: true,
        conditions: [],
        body: "The water does not drop in time, and in the end there is nothing to do but wait.\n\nYou are wedged in the gravel air bell above the flood, the pocket of close stale air the cave has left you, and you have stopped trying to make the crossing happen. The cold is all the way into you now, the deep shiver that comes in waves and then comes constant, your hands too stupid to do much but knock on the rock \u2014 bang, bang, bang, a pause, bang \u2014 the slow signal you were taught, sent up through the mountain to anyone who might be listening.\n\nThe lamp still gives its small disc, dimmer than it was, the dark sitting patient just past the gravel. You turn it down to save what\u2019s left. No sense burning light you\u2019ll want later, if there is a later.\n\nIf there is anyone beside you in the dark, you share the warmth and the waiting and the knocking. If there is not, the knocking is only yours. Either way the rock takes the sound and does not answer, because rock does not answer; it only carries.\n\nIt is {{time}}, or near it; down here the afternoon is a thing happening to other people, up in the light. Somewhere a club will notice you overdue. Somewhere a phone will ring. The call-out may come in time and may not, and the cave, which rose and sealed and dropped on its own indifferent clock, offers no opinion on the matter. You breathe. You knock. You wait in the cold for a rescue that may or may not come."
      }
    ]
  };

  // src/experiments/sump-line/content/sumpLine.ts
  var sumpLine = {
    id: "sump_line",
    title: "The Sump Line",
    startChapterId: "ch1_descent",
    carry: { vars: "all", resources: ["lamp_charge", "body_heat"], clues: true, inventory: true },
    gameDeadlineMinutes: 360,
    chapters: [
      {
        id: "ch1_descent",
        title: "The Pulse",
        story: ch1Descent,
        transitions: [
          { when: { conditions: [{ field: "cave_route", op: "equals", value: "high" }] }, goTo: "ch2_high" },
          { when: {}, goTo: "ch2_sump" }
        ]
      },
      { id: "ch2_high", title: "The Dry High Traverse", story: ch2High, gameEnding: true, transitions: [] },
      { id: "ch2_sump", title: "The Flooded Sump Crawl", story: ch2Sump, gameEnding: true, transitions: [] }
    ]
  };

  // src/experiments/sump-line/play/main.ts
  function substituteTime(text, timeLabel) {
    return text.replace(/\{\{time\}\}/g, timeLabel);
  }
  function paragraphs(body, timeLabel) {
    return substituteTime(body, timeLabel).split("\n\n").map((p) => `<p>${escapeHtml(p)}</p>`).join("");
  }
  function escapeHtml(s) {
    return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }
  function meter(label, value, max) {
    const v = Math.max(0, Math.min(max, Number(value)));
    const pct = Math.round(v / max * 100);
    const low = pct <= 25 ? " low" : "";
    return `<div class="meter${low}"><span class="meter-label">${label}</span><span class="meter-track"><span class="meter-fill" style="width:${pct}%"></span></span></div>`;
  }
  function renderView(view) {
    var _a;
    if (view.gameOver && view.endingReached) {
      const e = view.endingReached;
      return `
      <div class="ending">
        <div class="ending-kicker">\u2014 an ending \u2014</div>
        <h1 class="ending-name">${escapeHtml(e.name)}</h1>
        <div class="prose">${paragraphs((_a = e.body) != null ? _a : e.summary, view.timeLabel)}</div>
        <button class="restart" data-restart="1">Climb back in</button>
      </div>`;
    }
    const lamp = view.state.vars.lamp_charge;
    const heat = view.state.vars.body_heat;
    const choices = view.choices.filter((c) => c.available).map((c) => `<button class="choice" data-choice="${c.id}">${escapeHtml(c.label)}</button>`).join("");
    return `
    <div class="status">
      <span class="chapter">${escapeHtml(view.chapterTitle)}</span>
      <span class="clock">${escapeHtml(view.timeLabel)}</span>
    </div>
    <div class="meters">${meter("Lamp", lamp, 100)}${meter("Warmth", heat, 100)}</div>
    <div class="scene">
      <h2 class="node-title">${escapeHtml(view.node.title)}</h2>
      <div class="prose">${paragraphs(view.node.body, view.timeLabel)}</div>
    </div>
    <div class="choices">${choices}</div>`;
  }
  function mount(root) {
    let runner = new GameRunner(sumpLine);
    const draw = () => {
      root.innerHTML = renderView(runner.view());
      root.querySelectorAll("[data-choice]").forEach(
        (b) => b.addEventListener("click", () => {
          runner.choose(b.dataset.choice);
          draw();
          window.scrollTo({ top: 0, behavior: "smooth" });
        })
      );
      const restart = root.querySelector("[data-restart]");
      if (restart) restart.addEventListener("click", () => {
        runner = new GameRunner(sumpLine);
        draw();
      });
    };
    draw();
  }
  if (typeof document !== "undefined") {
    const el = document.getElementById("app");
    if (el) mount(el);
  }
})();
</script>
